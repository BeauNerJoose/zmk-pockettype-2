# ZMK Studio Support
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_KEYBOARD_NAME="PocketType"
CONFIG_ZMK_USB_LOGGING=n

# Battery Service (for OS-level battery monitoring)
CONFIG_BT_BAS=y

# Power Management - Idle & Sleep
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# External Power Control (for future LED/USB-C features)
CONFIG_ZMK_EXT_POWER=y
